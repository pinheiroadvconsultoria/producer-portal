<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal do Produtor Rural — Sem conexão</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; margin: 0; background: #f5f0e8; flex-direction: column; gap: 16px; }
    .icon { font-size: 72px; }
    h1 { color: #1a3a2a; font-size: 24px; margin: 0; }
    p { color: #6b7280; text-align: center; max-width: 360px; margin: 0; font-size: 15px; }
    button { background: #2d6a4f; color: white; border: none; padding: 12px 28px; border-radius: 10px;
             font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    button:hover { background: #1a3a2a; }
    .badge { font-size: 11px; color: #9ca3af; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="icon">🌱</div>
  <h1>Portal do Produtor Rural</h1>
  <p>Você está offline. Verifique sua conexão com a internet e tente novamente.</p>
  <button onclick="location.reload()">🔄 Tentar novamente</button>
  <div class="badge">NPL Sociedade de Advogados</div>
</body>
</html>
